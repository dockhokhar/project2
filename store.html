
<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Store page</title>
    <style>
        *{
            box-sizing: border-box; margin: 0; padding: 0;
        }

        body{
            font-family: 'Times New Roman', Times, serif;
            background:skyblue;
        }
header{
    background: wheat;
    color: black;
    padding: 15px 10%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position:sticky;
    top:0;
    z-index: 10;
}
header a{
    color:crimson;
    text-decoration: none;
    margin: 40px;
    font-size: 18px;
}
h1{
    text-align: center;
}
.product-grid{
    display: grid;
    grid-template-columns:repeat(3,1fr); gap: 20px;padding:0 10% 50px  10%;
}
.card{
    background: whitesmoke;
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    transition: transform 0.3s ease;
}
.card:hover{
    transform: translateY(-10px) scale(1.2);
}
.card img{width:100%;height:150px;object-fit: contain;}
.buy-btn{
    display: inline-block;
    padding: 10px 20px;
    background: grey;
    color: yellowgreen;
    text-decoration: none;
    border-radius: 10px;
    margin-top: 15px;
}

    </style>
</head>
<body>
    <header>
        <a href="index.html">Home</a>
        <nav>
            <a href="https://www.apple.com/">iPhone</a>
            <a href="https://www.apple.com/">iPad</a>
            <a href="https://www.apple.com/">Macbook</a>
            <a href="https://www.apple.com/">watch</a>
        </nav>
    </header>
    <h1>Welcome to ITEC 2130 Apple store</h1>
    <div class="product-grid">
        <div class="card"><img src="iphone17.webp"><h3>iPhone 17 Pro </h3><a href="#" class="buy-btn">Buy</a></div>
          <div class="card"><img src="ipad.webp"><h3>iPad 17 Pro </h3><a href="#" class="buy-btn">Buy</a></div>
            <div class="card"><img src="macbook.webp"><h3>Macbook </h3><a href="#" class="buy-btn">Buy</a></div>
              <div class="card"><img src="airpod.jpeg"><h3>Airpod </h3><a href="#" class="buy-btn">Buy</a></div>
                <div class="card"><img src="watch.webp"><h3>Apple Watch</h3><a href="#" class="buy-btn">Buy</a></div>
                  <div class="card"><img src="imac.webp"><h3>iMac</h3><a href="#" class="buy-btn">Buy</a></div>
    </div>
</body>
</html>
